	<script>
		window.addEventListener('DOMContentLoaded', ()=>{
			{
				let discord_client_secret=localStorage.getItem( (btoa(location.href)).slice(0, 16) + '.discord.client_secret' );
				if(!(discord_client_secret===null||discord_client_secret===undefined||discord_client_secret==='')){
					if(document.querySelectorAll('#discordapi_request_token input[type="password"]').length===1){
						document.querySelector('#discordapi_request_token input[type="password"]').value=discord_client_secret;
					}
				}
			}
			{
				let d=document.querySelector('#discordapi_request_token>input[type="password"]');
					d.addEventListener('keydown',ev=>{
						if(ev.key=='Enter'){
							d.closest('form').querySelector('input[type=button]').click();
						}
					}, {once:true,});
			}
			{
				let d=[];
				d.push(document.createElement('span'));
				d[d.length-1].style.position='fixed';
				d[d.length-1].style.bottom='0';
				d[d.length-1].style.left='0';
				d.push(document.createElement('a'));
				d.push(document.createElement('img'));
				d[d.length-1].src=`https://www.google.com/s2/favicons?size=64&domain=https://github.com`;
				d[d.length-2].appendChild(d[d.length-1]); /* a>img */
				d.pop();
				d[d.length-1].href=`https://github.com/n138-kz/sso_discord`;
				d[d.length-2].appendChild(d[d.length-1]); /* span>a>img */
				d.pop();
				d=d[d.length-1];

				if (document.querySelectorAll('footer').length>0) {
					document.querySelector('footer').appendChild(d);
				} else {
					document.body.appendChild(d);
				}
			}
			{
				let d=document.querySelector('#discord_authorize>a');
				d.href='https://discord.com/developers/applications';
				d.href='https://discord.com/oauth2/authorize';
				d.href+=`?client_id=${config.discord.client_id}`;
				d.href+=`&redirect_uri=${config.discord.redirect_uri}`;
				d.href+=`&response_type=code`;
				d.href+=`&scope=${config.discord.scope}`;
				d.href+=``;
				d.target='_self';

				if (true) {/* デバッグ用... */
					let d1=document.createElement('a');
					d1.href=`${config.discord.redirect_uri}`;
					d1.innerText=`Unauthorize`;
					d1.style.paddingLeft='100px';
					d.after(d1);
				}
			}
			Array.from(document.querySelectorAll('meta[http-equiv="refresh"]')).map(e=>{
				let countdown=parseInt(`${e.content};`.split(';')[0]);
				timerId=setInterval(()=>{
					countdown--;
					if(countdown<=0) clearInterval(timerId);
					/* 
					console.debug(`countdown: ${countdown}/${parseInt(`${e.content};`.split(';')[0])} key:${timerId}`);
					 */
				}, 1000);
				sessionStorage.setItem( (btoa(location.href)).slice(0, 16) + '.loopCounter.refreshPage', timerId );
			});
			Array.from(document.forms).map(e=>{
				e.addEventListener('keypress', k=>{
					if (k.key === 'Enter') {
						k.preventDefault(); // Enterキーによるデフォルトのsubmit動作をキャンセル
					}
				});
			});
		});
	</script>

	<script>
		class discord {
			static API_PROVIDER = `discord`;
			constructor(params) {}
			static async getToken(item=undefined, callback=[]){
				const item_wrapper=item;
				try {
					item=item.parentNode;
				} catch (error) { console.warn(error); item=undefined; }

				if (item!==undefined) {
					item.closest(`form`).querySelector(`input[type=password]`).setAttribute(`disabled`, `disabled`);
					item.closest(`form`).querySelector(`input[type=password]`).style.color=`#fff`;
				}
				
				if (item!==undefined) {
					localStorage.setItem( (btoa(location.href)).slice(0, 16) + `.${this.API_PROVIDER}.client_secret`, item.children.item(1).value );
					config[this.API_PROVIDER].client_secret=item.children.item(1).value;
				}
				
				let req_params={
					client_id: config[this.API_PROVIDER].client_id,
					client_secret: config[this.API_PROVIDER].client_secret,
					code: api.code,
					grant_type: `authorization_code`,
					redirect_uri: config[this.API_PROVIDER].redirect_uri,
				};
	
				if (item!==undefined) {
					item.children.item(0).style.borderColor=`#000`;
					item.children.item(0).style.backgroundColor=`#fff`;
					item.children.item(0).style.color=`#000`;
					Array.from(document.querySelectorAll('#errortext')).map(e=>e.remove());
				}
	
				try {
					let req=await fetch(`https://discordapp.com/api/oauth2/token`, {
						method: `POST`,
						headers: {'content-type': `application/x-www-form-urlencoded`},
						body: new URLSearchParams(req_params),
					});
					let res=await req.json();
					console.debug(`xhr result: ${await req.ok}`, {request: req, response: res});
					if (!await req.ok) {
						throw new Error(`${req.status}: ${res.message}`);
					}
	
					let b=document.createElement(`span`);
					b.innerText=`${req.status}: token has issued`;
					b.style.color=`#0a0`;
					b.id=`errortext`;
					if (item!==undefined) {
						item.appendChild(b);
	
						item.children.item(0).style.borderColor=`#0f0`;
						item.children.item(0).style.backgroundColor=`#0a0`;
						item.children.item(0).style.color=`#fff`;
					}
					{
						api.token[this.API_PROVIDER]=res;
						api.token[this.API_PROVIDER].issued_at=Date.now()/10**3;
						api.token[this.API_PROVIDER].issued_at_localized=`${new Date(api.token[this.API_PROVIDER].issued_at*10**3)}`;
						api.token[this.API_PROVIDER].expires_in=(api.token[this.API_PROVIDER].expires_in>0)?api.token[this.API_PROVIDER].expires_in:0;
						api.token[this.API_PROVIDER].expires_at=api.token[this.API_PROVIDER].issued_at+api.token[this.API_PROVIDER].expires_in;
						api.token[this.API_PROVIDER].expires_at_localized=`${new Date(api.token[this.API_PROVIDER].expires_at*10**3)}`;
					}
					{
						item_wrapper.setAttribute(`onclick`, `discord.updateToken(this)`);
						Array.from(document.querySelectorAll(`.require_authn`)).map(e=>e.classList.remove(`require_authn`));
					}
					try {
						sessionStorage.setItem( (btoa(location.href)).slice(0, 16) + `.${this.API_PROVIDER}.updateToken.loopCounter`,
							setInterval(()=>{
								this.updateToken();
							}, 10**3*300)
						);
						console.debug(`${this.API_PROVIDER}_updateToken_loopCounter: ${sessionStorage.getItem( (btoa(location.href)).slice(0, 16) + `.loopCounter.${this.API_PROVIDER}.updateToken` )}`);
						
						Array.from(document.querySelectorAll(`meta[http-equiv="refresh"]`)).map(e=>{
							console.debug(`meta[http-equiv="refresh"]:`, e);
							e.content=``;
							e.remove();
							window.stop();
						});
	
						item.closest(`form`).querySelector(`input[type=password]`).remove();
					} catch (error) { console.error(error); }
				} catch (error) {
					console.error(error);
	
					let b=document.createElement(`a`);
					b.href=`${location.origin}${location.pathname}`;
					b.target=`_self`;
					b.innerText=error;
					b.style.color=`#f00`;
					b.id=`errortext`;
					if (item!==undefined) {
						item.appendChild(b);
	
						item.children.item(0).style.borderColor='#f00';
						item.children.item(0).style.backgroundColor='#a00';
						item.children.item(0).style.color='#fff';
					}
	
					item.closest(`form`).querySelector(`input[type=password]`).removeAttribute(`disabled`);
					item.closest(`form`).querySelector(`input[type=password]`).style.removeProperty(`color`);
	
				}
				if(Array.isArray(callback)){
					Array.from(callback).map(async (c)=>await c());
				}
			}
			static async updateToken(item=undefined){
				const item_wrapper=item;
				try {
					item=item.parentNode;
				} catch (error) { console.warn(error); item=undefined; }

				let req_params={
					client_id: config[this.API_PROVIDER].client_id,
					client_secret: config[this.API_PROVIDER].client_secret,
					refresh_token: api.token[this.API_PROVIDER].refresh_token,
					grant_type: 'refresh_token',
				};

				if (item!==undefined) {
					item.children.item(0).style.borderColor='#000';
					item.children.item(0).style.backgroundColor='#fff';
					item.children.item(0).style.color='#000';
					Array.from(document.querySelectorAll('#errortext')).map(e=>e.remove());
				}

				try {
					let req=await fetch('https://discordapp.com/api/oauth2/token', {
						method: 'POST',
						headers: {'content-type': 'application/x-www-form-urlencoded'},
						body: new URLSearchParams(req_params),
					});
					let res=await req.json();
					console.debug('xhr result', res, await req.ok);
					if (!await req.ok) {
						throw new Error(`${req.status}: ${res.message}`);
					}
					{
						/* Refresh token */
						api.token[this.API_PROVIDER]=res;
						api.token[this.API_PROVIDER].issued_at=Date.now()/10**3;
						api.token[this.API_PROVIDER].issued_at_localized=`${new Date(api.token[this.API_PROVIDER].issued_at*10**3)}`;
						api.token[this.API_PROVIDER].expires_in=(api.token[this.API_PROVIDER].expires_in>0)?api.token[this.API_PROVIDER].expires_in:0;
						api.token[this.API_PROVIDER].expires_at=api.token[this.API_PROVIDER].issued_at+api.token[this.API_PROVIDER].expires_in;
						api.token[this.API_PROVIDER].expires_at_localized=`${new Date(api.token[this.API_PROVIDER].expires_at*10**3)}`;

						api.token[this.API_PROVIDER].refresh_count=
							(api.token[this.API_PROVIDER].refresh_count===undefined||api.token[this.API_PROVIDER].refresh_count===null||api.token[this.API_PROVIDER].refresh_count==='')?
							0:api.token[this.API_PROVIDER].refresh_count+1;
					}
					{
						let b=document.createElement('span');
						b.innerText=`${req.status}: token has updated`;
						b.style.color='#0a0';
						b.id='errortext';
						if (item!==undefined) {
							item.appendChild(b);

							item.children.item(0).style.borderColor='#0f0';
							item.children.item(0).style.backgroundColor='#0a0';
							item.children.item(0).style.color='#fff';
						}

						return b.innerText;
					}
				} catch (error) {
					console.error(error);

					let b=document.createElement('span');
					b.innerText=error;
					b.style.color='#f00';
					b.id='errortext';
					if (item!==undefined) {
						item.appendChild(b);

						item.children.item(0).style.borderColor='#f00';
						item.children.item(0).style.backgroundColor='#a00';
						item.children.item(0).style.color='#fff';
					}

					return b.innerText;
				}
			}
		}
	</script>
</head>
