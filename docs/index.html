	<script>
		window.addEventListener('DOMContentLoaded', ()=>{
			{
				if (false) { /* 仕様が決まってないので... */
				let discord_client_secret=localStorage.getItem( (btoa(location.href)).slice(0, 16) + '.discord.client_secret' );
				if(!(discord_client_secret===null||discord_client_secret===undefined||discord_client_secret==='')){
					if(document.querySelectorAll('#discord_request_token input[type="password"]').length===1){
						document.querySelector('#discord_request_token input[type="password"]').value=discord_client_secret;
					}
				}
				}
			}
			{
				if (false) { /* 仕様が決まってないので... */
				let d=document.querySelector('#discord_request_token>input[type="password"]');
					d.addEventListener('keydown',ev=>{
						if(ev.key=='Enter'){
							d.closest('form').querySelector('input[type=button]').click();
						}
					}, {once:true,});
				}
			}
			{
				let d=[];
				d.push(document.createElement('span'));
				d[d.length-1].style.position='fixed';
				d[d.length-1].style.bottom='0';
				d[d.length-1].style.left='0';
				d.push(document.createElement('a'));
				d.push(document.createElement('img'));
				d[d.length-1].src=`https://www.google.com/s2/favicons?size=64&domain=https://github.com`;
				d[d.length-2].appendChild(d[d.length-1]); /* a>img */
				d.pop();
				d[d.length-1].href=`https://github.com/n138-kz/sso_discord`;
				d[d.length-2].appendChild(d[d.length-1]); /* span>a>img */
				d.pop();
				d=d[d.length-1];

				if (document.querySelectorAll('footer').length>0) {
					document.querySelector('footer').appendChild(d);
				} else {
					document.body.appendChild(d);
				}
			}
			{
				let d=document.querySelector('#discord_authorize>a');
				d.href='https://discord.com/developers/applications';
				d.href='https://discord.com/oauth2/authorize';
				d.href+=`?client_id=${config.discord.client_id}`;
				d.href+=`&redirect_uri=${config.discord.redirect_uri}`;
				d.href+=`&response_type=code`;
				d.href+=`&scope=${config.discord.scope}`;
				d.href+=``;
				d.target='_self';

				if (true) {/* デバッグ用... */
					let d1=document.createElement('a');
					d1.href=`${config.discord.redirect_uri}`;
					d1.innerText=`Unauthorize`;
					d1.style.paddingLeft='100px';
					d.after(d1);
				}
			}
			Array.from(document.querySelectorAll('meta[http-equiv="refresh"]')).map(e=>{
				let countdown=parseInt(`${e.content};`.split(';')[0]);
				timerId=setInterval(()=>{
					countdown--;
					if(countdown<=0) clearInterval(timerId);
					/* 
					console.debug(`countdown: ${countdown}/${parseInt(`${e.content};`.split(';')[0])} key:${timerId}`);
					 */
				}, 1000);
				sessionStorage.setItem( (btoa(location.href)).slice(0, 16) + '.loopCounter.refreshPage', timerId );
			});
			Array.from(document.forms).map(e=>{
				e.addEventListener('keypress', k=>{
					if (k.key === 'Enter') {
						k.preventDefault(); // Enterキーによるデフォルトのsubmit動作をキャンセル
					}
				});
			});
		});
	</script>
